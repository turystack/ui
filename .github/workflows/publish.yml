name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    # Permissões cruciais para o OIDC (Trusted Publisher) e para o Git Push
    permissions:
      contents: write
      id-token: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para o histórico de tags e commits

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          # IMPORTANTE: Não use registry-url aqui para Trusted Publishing

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare and Publish
        run: |
          # Configura o Git para o commit automático
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Incrementa a versão no package.json localmente
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          
          echo "Publicando versão $VERSION via Trusted Publisher..."
          
          # Publicação usando OIDC (Trusted Publisher)
          # A flag --provenance gera o atestado de segurança que o npm exige
          pnpm publish --no-git-checks --provenance --access public
          
          # Só chegamos aqui se o publish acima tiver sucesso
          git add package.json
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin main --tags
        env:
          NODE_AUTH_TOKEN: ""